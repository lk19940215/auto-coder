name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['example/**', 'example-todo/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build main site
        run: npm install && npm run build
        working-directory: example

      - name: Build todo demo
        run: npm install && npm run build
        working-directory: example-todo

      - name: Merge outputs
        run: |
          mkdir -p example/dist/todo
          cp -r example-todo/dist/* example/dist/todo/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'example/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
